version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - app-network

  frontend:
    build:
      context: .
      target: frontend-build
    ports:
      - "5173:5173"
    command: yarn dev --host 0.0.0.0
    networks:
      - app-network

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app-network
    command: alembic upgrade head

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
