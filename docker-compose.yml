version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "8000:8000"
    networks:
      - app-network

  frontend:
    build:
      context: .
      target: frontend-build
    ports:
      - "5173:5173"
    command: yarn dev --host 0.0.0.0
    networks:
      - app-network

networks:
  app-network:
    driver: bridge